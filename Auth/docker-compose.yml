# ==============================================================================
# Docker Compose configuration for Auth Service
# ==============================================================================

services:
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api
    restart: unless-stopped

    expose:
      - "8000"

    environment:
      - APP_NAME=Auth API
      - APP_ENV=${APP_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - BCRYPT_ROUNDS=12
      - RATE_LIMIT_DEFAULT=100/minute
      - RATE_LIMIT_REGISTER=10/minute
      - RATE_LIMIT_LOGIN=10/minute
      - RATE_LIMIT_VERIFY=60/minute
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-*}
      - DB_POOL_SIZE=5
      - DB_MAX_OVERFLOW=10

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.auth-api.rule=Host(`72.61.179.20`)"
      - "traefik.http.routers.auth-api.entrypoints=websecure"
      - "traefik.http.routers.auth-api.tls=true"
      - "traefik.http.routers.auth-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.auth-api.loadbalancer.server.port=8000"

    networks:
      - auth-network
      - root_default

networks:
  auth-network:
  root_default:
    external: true